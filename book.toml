[book]
title = "The Windows Trust Chain"
authors = ["Parag Mali"]
description = "How modern Windows builds a verifiable chain of trust from silicon to cloud, and where attackers break it. An open, evidence-based technical book."
src = "src"
language = "en"

[build]
build-dir = "book"
create-missing = false

[preprocessor.trustchain]
command = "node tools/mdbook-trustchain.mjs"
renderers = ["html"]

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/MaliParag/windows-trust-chain"
git-repository-icon = "fa-github"
edit-url-template = "https://github.com/MaliParag/windows-trust-chain/edit/main/{path}"
additional-css = ["theme/trustchain.css"]
# For a GitHub Pages *project* site served at /<repo>/. Change if hosted elsewhere.
site-url = "/windows-trust-chain/"
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 2

[output.html.print]
enable = true
